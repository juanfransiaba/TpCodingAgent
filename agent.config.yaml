workspace: ./cases/football_predictor

memory:
  path: ./memory/project_memory.json

observability:
  provider: langfuse
  local_traces_path: ./runs/traces
  pricing:
    gpt-5-nano:
      input_per_1m_tokens: 0.05
      output_per_1m_tokens: 0.40

orchestrator:
  max_iterations: 8

permissions:
  read:
    deny:
      - ".env"
      - "**/*.pem"
      - "secrets/**"

  write:
    deny:
      - ".github/**"
      - "data/raw/**"
      - "requirements.txt"

commands:
  deny:
    - "rm -rf"
    - "git push"
    - "shutdown"
    - "reboot"
    - "format"

  require_approval:
    - "pip install"
    - "git commit"
    - "python scripts/evaluate.py"
