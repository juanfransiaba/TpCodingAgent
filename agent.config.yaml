# Repo objetivo del caso de uso: repositorio propio y separado (no vive dentro
# del TP). Es una copia standalone de ChoppedApp con su propio git/GitHub.
# Ajustar esta ruta si clonas el repo objetivo en otra ubicacion.
workspace: /Users/thiagoserebrinsky/facultad/projects/copiaDeChoppedApp/choppedapp_copia

memory:
  path: ./memory/project_memory.json

observability:
  provider: langfuse
  local_traces_path: ./runs/traces
  pricing:
    gpt-5-nano:
      input_per_1m_tokens: 0.05
      output_per_1m_tokens: 0.40

orchestrator:
  max_iterations: 20

permissions:
  read:
    deny:
      - ".env"
      - "**/.env"
      - "**/*.pem"
      - "secrets/**"

  write:
    deny:
      - ".github/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/*package-lock.json"
      - "**/.env"

commands:
  deny:
    - "rm -rf"
    - "git push"
    - "shutdown"
    - "reboot"
    - "format"

  require_approval:
    - "npm install"
    - "npm ci"
    - "pip install"
    - "git commit"
